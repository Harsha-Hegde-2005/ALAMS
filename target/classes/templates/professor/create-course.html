<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Create Course – ALAMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a th:href="@{/dashboard}" class="navbar-brand"><div class="brand-icon">🎓</div>ALAMS</a>
  <div class="nav-links">
    <a th:href="@{/dashboard}" class="nav-link">← Back to Dashboard</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
    <button type="submit" class="btn-logout">Logout</button>
    </form>
  </div>
</nav>
<div class="container" style="max-width:560px;">
  <div class="page-header">
    <h1>➕ Create New Course</h1>
    <p>Set up a new course for your students.</p>
  </div>
  <div class="card">
    <form th:action="@{/courses/create}" method="post">
      <div class="form-group">
        <label class="form-label">Course Name</label>
        <input type="text" name="courseName" class="form-control" placeholder="e.g. Object Oriented Analysis &amp; Design" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4" placeholder="Brief description of what students will learn..."></textarea>
      </div>
      <div class="flex-gap mt-2">
        <button type="submit" class="btn btn-primary">✅ Create Course</button>
        <a th:href="@{/dashboard}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
