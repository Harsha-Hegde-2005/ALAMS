<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – ALAMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🎓</div>
      <h1>Create Account</h1>
      <p>Join the Adaptive Learning System</p>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/register}" method="post">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="fullName" class="form-control" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Choose a password" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select name="role" class="form-control" required>
          <option value="STUDENT">🎒 Student</option>
          <option value="PROFESSOR">👨‍🏫 Professor</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
        ✅ Create Account
      </button>
    </form>

    <p class="text-center text-muted mt-2">
      Already have an account? <a th:href="@{/login}" style="color:var(--primary);font-weight:600;">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>
